<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: rounded square, Toss brand blue -->
  <rect width="32" height="32" rx="8" fill="#3182f6"/>
  <!-- Upward trend line -->
  <polyline
    points="5,22 11,16 17,19 27,9"
    fill="none"
    stroke="white"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.5"
  />
  <!-- Checkmark (goal achieved) -->
  <polyline
    points="8,16 13,21 24,10"
    fill="none"
    stroke="white"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
